<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NOVA PLAYER</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="player-body">
  <div class="player-container">
    <header class="player-header glass">
      <a href="/" class="back-btn">
        <span class="back-icon">&#8592;</span>
        <span>Back</span>
      </a>
      <div class="video-title-wrap">
        <h2 id="videoTitle" class="video-title">Loading...</h2>
      </div>
      <button id="settingsToggle" class="settings-btn" title="Settings">
        <span class="settings-icon">&#9881;</span>
      </button>
    </header>

    <div id="settingsPanel" class="settings-panel glass hidden">
      <div class="settings-group">
        <label>Default Volume</label>
        <input type="range" id="settingVolume" min="0" max="100" value="100">
        <span id="settingVolumeLabel">100%</span>
      </div>
      <div class="settings-group">
        <label>Default Speed</label>
        <select id="settingSpeed">
          <option value="0.5">0.5x</option>
          <option value="0.75">0.75x</option>
          <option value="1.0" selected>1x</option>
          <option value="1.25">1.25x</option>
          <option value="1.5">1.5x</option>
          <option value="2.0">2x</option>
          <option value="3.0">3x</option>
        </select>
      </div>
      <div class="settings-group">
        <label>
          <input type="checkbox" id="settingAutoResume" checked>
          Auto Resume
        </label>
      </div>
      <div class="settings-group">
        <label>
          <input type="checkbox" id="settingAutoPlay">
          Auto Play
        </label>
      </div>
      <button id="settingsSave" class="save-settings-btn">Save Settings</button>
    </div>

    <div class="video-wrapper">
      <video id="videoPlayer" class="video-player" preload="metadata" playsinline></video>
      <div id="thumbnailOverlay" class="thumbnail-overlay">
        <img id="thumbnailImg" src="" alt="Thumbnail">
        <button id="bigPlayBtn" class="big-play-btn">
          <span class="big-play-icon">&#9654;</span>
        </button>
      </div>
      <div id="loadingIndicator" class="loading-indicator hidden">
        <div class="spinner-ring small"></div>
        <span>Buffering...</span>
      </div>
    </div>

    <div class="video-info glass">
      <div class="info-row">
        <span id="uploaderInfo" class="uploader"></span>
        <span id="durationInfo" class="duration"></span>
      </div>
    </div>

    <div class="controls glass">
      <div class="seek-bar-container">
        <input
          type="range"
          id="seekBar"
          class="seek-bar"
          min="0"
          max="1000"
          value="0"
          step="1"
        >
        <div class="time-display">
          <span id="currentTime">00:00</span>
          <span id="totalTime">00:00</span>
        </div>
      </div>

      <div class="controls-row">
        <div class="controls-left">
          <button id="rewindBtn" class="ctrl-btn" title="Back 5s">
            <span class="ctrl-icon">&#9664;&#9664;</span>
            <span class="ctrl-label">5s</span>
          </button>
          <button id="playBtn" class="ctrl-btn ctrl-play" title="Play/Pause">
            <span id="playIcon" class="ctrl-icon">&#9654;</span>
          </button>
          <button id="forwardBtn" class="ctrl-btn" title="Forward 5s">
            <span class="ctrl-icon">&#9654;&#9654;</span>
            <span class="ctrl-label">5s</span>
          </button>
        </div>

        <div class="controls-center">
          <button id="volumeBtn" class="ctrl-btn" title="Mute/Unmute">
            <span id="volumeIcon" class="ctrl-icon">&#128266;</span>
          </button>
          <div class="volume-slider-wrap">
            <input
              type="range"
              id="volumeSlider"
              class="volume-slider"
              min="0"
              max="100"
              value="100"
            >
          </div>
          <span id="volumeLabel" class="volume-label">100%</span>
        </div>

        <div class="controls-right">
          <div class="speed-selector">
            <select id="speedSelect" class="speed-dropdown">
              <option value="0.5">0.5x</option>
              <option value="0.75">0.75x</option>
              <option value="1.0" selected>1x</option>
              <option value="1.25">1.25x</option>
              <option value="1.5">1.5x</option>
              <option value="2.0">2x</option>
              <option value="3.0">3x</option>
            </select>
          </div>
          <button id="pipBtn" class="ctrl-btn" title="Picture in Picture">
            <span class="ctrl-icon">&#9201;</span>
          </button>
          <button id="fullscreenBtn" class="ctrl-btn" title="Fullscreen">
            <span id="fullscreenIcon" class="ctrl-icon">&#9974;</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="player.js"></script>
</body>
</html>
